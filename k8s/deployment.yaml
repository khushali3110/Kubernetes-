apiVersion: apps/v1
kind: Deployment
metadata:
  name: intern-app-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: intern-app
  template:
    metadata:
      labels:
        app: intern-app
    spec:
      containers:
      - name: app-container
        image: your-docker-username/intern-app:latest 
        ports:
        - containerPort: 3000
        env:
        - name: APP_MODE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_MODE
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD